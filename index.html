<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}
body{
background:linear-gradient(135deg,#FFD6EA,#FFC7E3,#FFB6D5,#FFEAF4);
background-size:400% 400%;
animation:bg 12s infinite alternate;
min-height:100vh;
overflow:hidden;
}
@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}
/* เมนู */
nav{
display:flex;
justify-content:center;
padding:25px;
}
nav ul{
display:flex;
gap:20px;
list-style:none;
background:rgba(255,255,255,.35);
backdrop-filter:blur(15px);
padding:16px 35px;
border-radius:50px;
box-shadow:0 8px 25px rgba(255,105,180,.25);
}
nav a{
text-decoration:none;
color:#ff1493;
font-weight:600;
padding:10px 20px;
border-radius:30px;
transition:.3s;
}
nav a:hover{
background:#ff69b4;
color:white;
}
/* ส่วนกลาง */
.hero{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}
.card{
width:900px;
max-width:95%;
background:rgba(255,255,255,.28);
backdrop-filter:blur(20px);
border-radius:35px;
padding:40px;
text-align:center;
box-shadow:0 20px 40px rgba(255,105,180,.25);
}
.profile{
width:220px;
height:220px;
border-radius:50%;
border:6px solid white;
object-fit:cover;
margin-bottom:25px;
}
/* ชื่อ */
.name{
font-size:28px;
font-weight:700;
color:#ff1493;
white-space:nowrap;
display:block;
width:100%;
text-align:center;
margin-bottom:10px;
}
.subtitle{
font-size:22px;
color:#666;
margin-bottom:25px;
}
.btn{
display:inline-block;
padding:15px 45px;
border-radius:40px;
background:#ff69b4;
color:white;
text-decoration:none;
font-size:18px;
transition:.3s;
}
.btn:hover{
transform:scale(1.05);
background:#ff1493;
}
/* Responsive */
@media(max-width:900px){
nav ul{
flex-wrap:wrap;
justify-content:center;
}
.name{
font-size:22px;
white-space:normal;
}
.card{
width:95%;
}
.profile{
width:180px;
height:180px;
}
}
</style>
</head>
<body>
<nav>
<ul>
<li><a href="index.html">🏠 หน้าแรก</a></li>
<li><a href="profile.html">👤 ประวัติส่วนตัว</a></li>
<li><a href="education.html">🎓 การศึกษา</a></li>
<li><a href="portfolio.html">💼 ผลงาน</a></li>
<li><a href="activities.html">🌸 กิจกรรม</a></li>
</ul>
</nav>
<section class="hero">
<div class="card">
<img src="images/profile.png" class="profile" alt="Profile">
<h1 class="name">นางสาวเบญญาพร จันทะสุทธิ์</h1>
<p class="subtitle">Welcome to My Portfolio</p>
<a href="profile.html" class="btn">เข้าสู่เว็บไซต์</a>
</div>
</section>

<!-- เอฟเฟกต์และเพลง -->
<button id="music-toggle" class="music-btn">🎵 เปิดเพลง</button>

<audio id="bg-music" loop>
    <source src="music/เพลง.mp3" type="audio/mpeg">
</audio>

<div id="sakura-container"></div>
<div id="sparkle-container"></div>
<div id="heart-container"></div>

<script src="js/script.js"></script>
</body>
</html>
