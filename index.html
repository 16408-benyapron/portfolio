<!DOCTYPE html>

<head>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#FFD6EA,#FFC7E3,#FFB6D5,#FFEAF4);
overflow-x:hidden;
}

.hero{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.card{

width:900px;
max-width:95%;
background:rgba(255,255,255,.35);
backdrop-filter:blur(20px);
border-radius:35px;
padding:50px;
text-align:center;
box-shadow:0 15px 35px rgba(255,105,180,.25);

}

.profile{

width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 25px rgba(255,105,180,.4);

}

h1{

font-size:55px;
color:#ff1493;
margin:25px 0 10px;

}

h2{

font-size:30px;
color:#ff69b4;
margin-bottom:20px;

}

p{

font-size:22px;
color:#555;
line-height:1.8;

}

.button-group{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:35px;

}

.btn{

background:#ff69b4;
color:white;
text-decoration:none;
padding:15px 28px;
border-radius:35px;
font-size:20px;
transition:.3s;

}

.btn:hover{

background:#ff1493;
transform:scale(1.05);

}

footer{

margin-top:40px;
font-size:18px;
color:#777;

}

@media(max-width:768px){

h1{
font-size:38px;
}

h2{
font-size:24px;
}

p{
font-size:18px;
}

.profile{
width:170px;
height:170px;
}

.button-group{
flex-direction:column;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="card">

<img src="images/IMG_1105.jpeg" class="profile">

</div>

<footer>

</div>
